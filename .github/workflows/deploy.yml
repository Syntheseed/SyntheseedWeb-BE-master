name: Build and Deploy to ECS Express Mode

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 463470972750
  ECR_REPOSITORY: syntheseedweb-be
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get short commit hash
        run: echo "IMAGE_TAG=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS Express Mode
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ env.ECS_SERVICE }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          execution-role-arn: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          infrastructure-role-arn: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsInfrastructureRoleForExpressServices
          cluster: ${{ env.ECS_CLUSTER }}
          container-port: 8000
          environment-variables: |
            [
              {"name": "DJANGO_SETTINGS_MODULE", "value": "company_backend.settings"},
              {"name": "PYTHONUNBUFFERED",        "value": "1"},
              {"name": "DB_ENGINE",               "value": "django.db.backends.postgresql"},
              {"name": "DB_NAME",                 "value": "${{ secrets.DB_NAME }}"},
              {"name": "DB_USER",                 "value": "${{ secrets.DB_USER }}"},
              {"name": "DB_PASSWORD",             "value": "${{ secrets.DB_PASSWORD }}"},
              {"name": "DB_HOST",                 "value": "${{ secrets.DB_HOST }}"},
              {"name": "DB_PORT",                 "value": "${{ secrets.DB_PORT }}"},
              {"name": "ECS_HOST",                "value": "ecs-express-gateway-alb-8b70b9dc-717616123.us-east-1.elb.amazonaws.com"}
            ]
          health-check-path: /api/blogs/
          min-task-count: 1
          max-task-count: 4
          auto-scaling-metric: AVERAGE_CPU
          auto-scaling-target-value: 70
